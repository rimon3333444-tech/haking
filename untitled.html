<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কালার ট্রেডিং প্রেডিকশন</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h2 {
            color: #00ff88;
        }
        .timer-box {
            background: #222;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            border: 1px dashed #0077ff;
            color: #0077ff;
            margin-bottom: 20px;
        }
        #countdown {
            color: #ff9800;
            font-size: 22px;
        }
        .number-circle {
            display: inline-block;
            width: 80px;
            height: 80px;
            line-height: 80px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 50%;
            margin-bottom: 20px;
            color: white;
            background-color: #333;
        }
        .badge {
            display: inline-block;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            margin: 5px;
            text-transform: uppercase;
        }
        .bg-small { background-color: #ff9800; color: black; }
        .bg-big { background-color: #e91e63; color: white; }
        .bg-green { background-color: #4caf50; color: white; }
        .bg-red { background-color: #f44336; color: white; }
        .bg-violet { background-color: #9c27b0; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Color Trading Predictor</h2>

    <div class="timer-box">
        পরবর্তী প্রেডিকশন বাকি: <span id="countdown">৩০</span> সেকেন্ড
    </div>

    <div>
        <h3>প্রেডিক্টেড নাম্বার</h3>
        <div id="predictedNumber" class="number-circle">?</div>
        <div>
            <span id="sizeBadge" class="badge" style="display:none;"></span>
            <span id="colorBadge1" class="badge" style="display:none;"></span>
            <span id="colorBadge2" class="badge" style="display:none;"></span>
        </div>
    </div>
</div>

<script>
    let timeLeft = 30;
    let timerInterval;

    window.onload = function() {
        startPredictor();
    };

    function startPredictor() {
        generatePrediction();
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText = timeLeft;
            if (timeLeft <= 0) {
                timeLeft = 30;
                generatePrediction();
            }
        }, 1000);
    }

    function generatePrediction() {
        const predictedNumEl = document.getElementById('predictedNumber');
        const sizeBadge = document.getElementById('sizeBadge');
        const colorBadge1 = document.getElementById('colorBadge1');
        const colorBadge2 = document.getElementById('colorBadge2');

        const num = Math.floor(Math.random() * 10);
        predictedNumEl.innerText = num;

        if (num >= 0 && num <= 4) {
            sizeBadge.innerText = "SMALL";
            sizeBadge.className = "badge bg-small";
        } else {
            sizeBadge.innerText = "BIG";
            sizeBadge.className = "badge bg-big";
        }
        sizeBadge.style.display = "inline-block";

        let colors = [];
        if ([1, 3, 5, 7, 9].includes(num)) {
            colors.push({ text: "GREEN", class: "bg-green" });
        } else {
            colors.push({ text: "RED", class: "bg-red" });
        }

        if (num === 0 || num === 5) {
            colors.push({ text: "VIOLET", class: "bg-violet" });
        }

        colorBadge1.innerText = colors[0].text;
        colorBadge1.className = "badge " + colors[0].class;
        colorBadge1.style.display = "inline-block";

        if (colors.length > 1) {
            colorBadge2.innerText = colors[1].text;
            colorBadge2.className = "badge " + colors[1].class;
            colorBadge2.style.display = "inline-block";
        } else {
            colorBadge2.style.display = "none";
        }
    }
</script>

</body>
</html>
